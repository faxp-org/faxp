name: FAXP CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  protocol_core_lane:
    name: Protocol Core Lane
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Protocol-core guardrails
        run: |
          python tests/run_scope_guardrails.py

      - name: Protocol-core schema compatibility
        run: |
          python tests/run_schema_compatibility.py

      - name: Booking identity + handoff profile checks
        run: |
          python tests/run_booking_identity_terms.py
          python tests/run_operational_handoff_terms.py

  reference_runtime_lane:
    name: Reference Runtime Lane
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reference runtime smoke checks
        run: |
          python tests/run_streamlit_state_logic.py
          python tests/run_verifier_translator.py
          python tests/run_trusted_verifier_registry.py

  verify:
    needs:
      - protocol_core_lane
      - reference_runtime_lane
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Initialize CI Run ID
        id: ci_run_id
        run: |
          RUN_ID="$(python - <<'PY'
          import uuid
          print(uuid.uuid4())
          PY
          )"
          LOG_DIR="/tmp/faxp-ci-${RUN_ID}"
          mkdir -p "${LOG_DIR}"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "log_dir=${LOG_DIR}" >> "$GITHUB_OUTPUT"
          echo "[INFO] CI RunID: ${RUN_ID}"
          echo "[INFO] CI LogDir: ${LOG_DIR}"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency vulnerability audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt --progress-spinner off

      - name: Make scripts executable
        run: |
          chmod +x \
            scripts/security_gate.sh \
            scripts/generate_faxp_keys.sh \
            scripts/rotate_faxp_keys.sh \
            scripts/incident_drill.sh \
            scripts/run_a2a_conformance.sh \
            scripts/run_mcp_conformance.sh \
            scripts/run_release_smoke_local.sh \
            scripts/run_secure_demo.sh \
            conformance/quickstart/make_conformance_bundle.sh

      - name: Shell syntax checks
        run: |
          bash -n \
            scripts/security_gate.sh \
            scripts/generate_faxp_keys.sh \
            scripts/rotate_faxp_keys.sh \
            scripts/incident_drill.sh \
            scripts/run_a2a_conformance.sh \
            scripts/run_mcp_conformance.sh \
            scripts/run_release_smoke_local.sh \
            scripts/run_secure_demo.sh \
            conformance/quickstart/make_conformance_bundle.sh

      - name: Python compile checks
        run: |
          python -m py_compile faxp_mvp_simulation.py streamlit_app.py streamlit_state_logic.py scripts/check_a2a_upstream.py scripts/check_mcp_upstream.py conformance/a2a_bridge_translator.py conformance/generate_attestation.py conformance/conformance_bundle.py conformance/verifier_translator.py conformance/submission_manifest_signing.py conformance/protocol_compatibility_signing.py conformance/rate_model_profile_signing.py conformance/create_submission_manifest.py conformance/registry_update_signing.py conformance/create_registry_update.py conformance/apply_registry_update.py conformance/run_all_checks.py tests/policy_profile_matrix.py tests/run_streamlit_state_logic.py tests/run_schema_compatibility.py tests/run_rate_model_profile.py tests/run_rate_model_profile_signature.py tests/run_rate_model_extensibility.py tests/run_rate_model_requirements.py tests/run_rate_search_requirements.py tests/run_accessorial_terms.py tests/run_accessorial_terms_profile.py tests/run_detention_terms_profile.py tests/run_accessorial_type_registry.py tests/run_operational_handoff_terms.py tests/run_operational_handoff_profile.py tests/run_booking_identity_terms.py tests/run_booking_identity_profile.py tests/run_multi_stop_terms.py tests/run_multi_stop_terms_profile.py tests/run_special_instructions_terms.py tests/run_special_instructions_profile.py tests/run_schedule_terms.py tests/run_schedule_terms_profile.py tests/run_driver_configuration_terms.py tests/run_driver_configuration_profile.py tests/run_load_reference_numbers_terms.py tests/run_load_reference_numbers_profile.py tests/run_equipment_terms.py tests/run_equipment_profile.py tests/run_equipment_type_alias_coverage.py tests/run_role_capability_policy.py tests/run_shipper_orchestration_minimal.py tests/run_shipper_orchestration_profile.py tests/run_builder_integration_profile.py tests/run_composite_booking_scenarios.py tests/run_booking_plane_commercial_terms_doc.py tests/run_protocol_compatibility_profile.py tests/run_protocol_compatibility_signature.py tests/run_protocol_version_negotiation.py tests/run_cross_version_fixtures.py tests/run_certification_artifacts.py tests/run_verification_policy_profile.py tests/run_policy_decisions.py tests/run_policy_profile_sync.py tests/run_generate_attestation.py tests/run_conformance_bundle.py tests/run_verifier_translator.py tests/run_adapter_test_profile.py tests/run_adapter_certification_profile_v2.py tests/run_submission_manifest.py tests/run_create_submission_manifest.py tests/run_registry_ops_artifacts.py tests/run_registry_admission_policy.py tests/run_registry_changelog_artifacts.py tests/run_trusted_verifier_registry.py tests/run_vendor_direct_profile.py tests/run_trust_profile.py tests/run_decision_record_template.py tests/run_decision_record_artifacts.py tests/run_governance_index.py tests/run_release_readiness.py tests/run_a2a_profile_check.py tests/run_a2a_roundtrip_translation.py tests/run_a2a_watch_artifacts.py tests/run_mcp_profile_check.py tests/run_mcp_watch_artifacts.py tests/run_interop_maturity_profile.py tests/run_create_registry_update.py tests/run_apply_registry_update.py tests/run_key_lifecycle_policy.py tests/run_conformance_suite.py tests/run_scope_guardrails.py tests/run_public_redaction_guardrails.py tests/run_open_source_guardrails.py

      - name: Protocol scope guardrails lint
        run: |
          python tests/run_scope_guardrails.py

      - name: Public redaction guardrails
        run: |
          python tests/run_public_redaction_guardrails.py

      - name: Open-source governance guardrails
        run: |
          python tests/run_open_source_guardrails.py
      - name: Streamlit state regression checks
        run: |
          python tests/run_streamlit_state_logic.py

      - name: Schema compatibility checks (v0.1.1 + v0.2)
        run: |
          python tests/run_schema_compatibility.py

      - name: Protocol version negotiation checks
        run: |
          python tests/run_protocol_version_negotiation.py

      - name: Protocol compatibility profile checks
        run: |
          python tests/run_protocol_compatibility_profile.py

      - name: Protocol compatibility signature checks
        run: |
          python tests/run_protocol_compatibility_signature.py

      - name: Cross-version fixture conformance checks
        run: |
          python tests/run_cross_version_fixtures.py

      - name: Certification/profile artifact checks
        run: |
          python tests/run_certification_artifacts.py

      - name: Verification policy profile checks
        run: |
          python tests/run_verification_policy_profile.py

      - name: Verification policy decision checks
        run: |
          python tests/run_policy_decisions.py

      - name: Policy profile doc/test sync checks
        run: |
          python tests/run_policy_profile_sync.py

      - name: Attestation generator checks
        run: |
          python tests/run_generate_attestation.py

      - name: Conformance bundle checks
        run: |
          python tests/run_conformance_bundle.py --output "$RUNNER_TEMP/conformance_report.json"
          rg -q '"passed": true' "$RUNNER_TEMP/conformance_report.json"

      - name: Verifier translator checks
        run: |
          python tests/run_verifier_translator.py

      - name: Adapter test profile checks
        run: |
          python tests/run_adapter_test_profile.py

      - name: Adapter certification profile v2 checks
        run: |
          python tests/run_adapter_certification_profile_v2.py

      - name: Submission manifest bundle checks
        run: |
          python tests/run_submission_manifest.py

      - name: Submission manifest create helper checks
        run: |
          python tests/run_create_submission_manifest.py

      - name: Key lifecycle policy checks
        run: |
          python tests/run_key_lifecycle_policy.py

      - name: Conformance suite orchestrator checks
        run: |
          python tests/run_conformance_suite.py

      - name: Registry operations artifact checks
        run: |
          python tests/run_registry_ops_artifacts.py

      - name: Registry admission policy checks
        run: |
          python tests/run_registry_admission_policy.py

      - name: Registry changelog artifact checks
        run: |
          python tests/run_registry_changelog_artifacts.py

      - name: Trusted verifier registry checks
        run: |
          python tests/run_trusted_verifier_registry.py

      - name: Vendor-direct profile checks
        run: |
          python tests/run_vendor_direct_profile.py

      - name: Trust profile checks
        run: |
          python tests/run_trust_profile.py

      - name: Certification decision record template checks
        run: |
          python tests/run_decision_record_template.py

      - name: Certification decision record artifact checks
        run: |
          python tests/run_decision_record_artifacts.py

      - name: Governance index checks
        run: |
          python tests/run_governance_index.py

      - name: Release readiness checks
        run: |
          python tests/run_release_readiness.py

      - name: Canonical local release smoke script
        run: |
          REPORT_PATH="$RUNNER_TEMP/faxp_conformance_suite_report.ci_local_smoke.json"
          ./scripts/run_release_smoke_local.sh "$REPORT_PATH"
          python - <<'PY' "$REPORT_PATH"
          import json
          import sys
          from pathlib import Path
          report_path = Path(sys.argv[1])
          payload = json.loads(report_path.read_text(encoding="utf-8"))
          print("[INFO] Canonical smoke summary:", json.dumps(payload.get("summary", {}), sort_keys=True))
          print("[INFO] Canonical smoke report:", str(report_path))
          PY

      - name: Booking-plane commercial terms governance checks
        run: |
          python tests/run_booking_plane_commercial_terms_doc.py

      - name: A2A compatibility profile checks
        run: |
          python tests/run_a2a_profile_check.py

      - name: A2A round-trip translation checks
        run: |
          python tests/run_a2a_roundtrip_translation.py

      - name: A2A watch artifact checks
        run: |
          python tests/run_a2a_watch_artifacts.py

      - name: MCP compatibility profile checks
        run: |
          python tests/run_mcp_profile_check.py

      - name: MCP watch artifact checks
        run: |
          python tests/run_mcp_watch_artifacts.py

      - name: Interop maturity profile checks
        run: |
          python tests/run_interop_maturity_profile.py

      - name: Rate model profile checks
        run: |
          python tests/run_rate_model_profile.py

      - name: Rate model profile signature checks
        run: |
          python tests/run_rate_model_profile_signature.py

      - name: Rate model extensibility checks
        run: |
          python tests/run_rate_model_extensibility.py

      - name: Rate model requirement checks
        run: |
          python tests/run_rate_model_requirements.py

      - name: Rate search requirement checks
        run: |
          python tests/run_rate_search_requirements.py

      - name: Accessorial commercial-term checks
        run: |
          python tests/run_accessorial_terms.py

      - name: Accessorial commercial-term profile checks
        run: |
          python tests/run_accessorial_terms_profile.py

      - name: Detention terms profile checks
        run: |
          python tests/run_detention_terms_profile.py

      - name: Accessorial type registry checks
        run: |
          python tests/run_accessorial_type_registry.py

      - name: Operational handoff runtime checks
        run: |
          python tests/run_operational_handoff_terms.py

      - name: Operational handoff profile checks
        run: |
          python tests/run_operational_handoff_profile.py

      - name: Booking identity runtime checks
        run: |
          python tests/run_booking_identity_terms.py

      - name: Booking identity profile checks
        run: |
          python tests/run_booking_identity_profile.py

      - name: Multi-stop commercial-term checks
        run: |
          python tests/run_multi_stop_terms.py

      - name: Multi-stop commercial-term profile checks
        run: |
          python tests/run_multi_stop_terms_profile.py

      - name: Special-instructions commercial-term checks
        run: |
          python tests/run_special_instructions_terms.py

      - name: Special-instructions commercial-term profile checks
        run: |
          python tests/run_special_instructions_profile.py

      - name: Schedule commitment checks
        run: |
          python tests/run_schedule_terms.py

      - name: Schedule commitment profile checks
        run: |
          python tests/run_schedule_terms_profile.py

      - name: Driver configuration term checks
        run: |
          python tests/run_driver_configuration_terms.py

      - name: Driver configuration profile checks
        run: |
          python tests/run_driver_configuration_profile.py

      - name: Load reference number checks
        run: |
          python tests/run_load_reference_numbers_terms.py

      - name: Load reference number profile checks
        run: |
          python tests/run_load_reference_numbers_profile.py

      - name: Equipment taxonomy compatibility checks
        run: |
          python tests/run_equipment_terms.py

      - name: Equipment taxonomy profile checks
        run: |
          python tests/run_equipment_profile.py

      - name: Equipment type alias coverage checks
        run: |
          python tests/run_equipment_type_alias_coverage.py

      - name: Role capability policy checks
        run: |
          python tests/run_role_capability_policy.py

      - name: Shipper orchestration minimal checks
        run: |
          python tests/run_shipper_orchestration_minimal.py

      - name: Shipper orchestration profile checks
        run: |
          python tests/run_shipper_orchestration_profile.py

      - name: Builder integration profile checks
        run: |
          python tests/run_builder_integration_profile.py

      - name: Composite booking scenario checks
        run: |
          python tests/run_composite_booking_scenarios.py

      - name: Registry update create helper checks
        run: |
          python tests/run_create_registry_update.py

      - name: Registry apply tool checks
        run: |
          python tests/run_apply_registry_update.py

      - name: Quickstart bundle smoke check
        run: |
          bash conformance/quickstart/make_conformance_bundle.sh "$RUNNER_TEMP/quickstart_bundle"

      - name: Security gate (template)
        run: |
          ./scripts/security_gate.sh security.env.template

      - name: Generate CI key material
        run: |
          ./scripts/generate_faxp_keys.sh "$RUNNER_TEMP/faxp-secrets"
          cp "$RUNNER_TEMP/faxp-secrets/security.env.local" "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          sed -i 's/^FAXP_APP_MODE=.*/FAXP_APP_MODE=local/' "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          sed -i 's/^FAXP_REQUIRE_EXTERNAL_SECRET_MANAGER=.*/FAXP_REQUIRE_EXTERNAL_SECRET_MANAGER=0/' "$RUNNER_TEMP/faxp-secrets/security.env.ci"

      - name: Simulation smoke test
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --provider MockBiometricProvider --response Accept --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-sim-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-sim-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "\"provider\": \"identity.liveness-document.mock\"" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-sim-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Neutrality smoke test (compliance mock provider)
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --provider MockComplianceProvider --response Accept --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-neutrality-compliance-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-neutrality-compliance-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "\"provider\": \"compliance.authority-record.mock\"" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-neutrality-compliance-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Security self-test
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --security-self-test --self-test-iterations 25 | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-self-test-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Capability mismatch fails closed
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --force-capability-mismatch --provider MockBiometricProvider --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-capability-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Capability mismatch" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-capability-${{ steps.ci_run_id.outputs.run_id }}.log"
          ! rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-capability-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Legacy alias compatibility (iDenfy)
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --provider iDenfy --response Accept --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-alias-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-alias-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Reject raw biometric payload fields
        run: |
          python - <<'PY'
          from faxp_mvp_simulation import validate_message_body

          execution_report_body = {
              "LoadID": "load-123",
              "ContractID": "FAXP-20260221-abc123",
              "Status": "Booked",
              "Timestamp": "2026-02-21T00:00:00Z",
              "VerifiedBadge": "None",
              "VerificationResult": {
                  "status": "Success",
                  "provider": "MockBiometricProvider",
                  "rawBiometric": "forbidden-demo-payload"
              }
          }

          try:
              validate_message_body("ExecutionReport", execution_report_body)
          except ValueError as exc:
              message = str(exc)
              if "biometric artifacts" not in message:
                  raise SystemExit(f"Unexpected validation error: {message}")
          else:
              raise SystemExit("Expected raw biometric payload rejection did not occur.")

          print("Raw biometric payload rejection check passed.")
          PY

      - name: Require verifier attestation when signed mode is enabled
        run: |
          python - <<'PY'
          from faxp_mvp_simulation import REQUIRE_SIGNED_VERIFIER, validate_message_body

          execution_report_body = {
              "LoadID": "load-123",
              "ContractID": "FAXP-20260221-abc123",
              "Status": "Booked",
              "Timestamp": "2026-02-21T00:00:00Z",
              "VerifiedBadge": "None",
              "VerificationResult": {
                  "status": "Success",
                  "provider": "MockBiometricProvider",
                  "score": 90,
                  "token": "opaque-token"
              }
          }

          if REQUIRE_SIGNED_VERIFIER:
              try:
                  validate_message_body("ExecutionReport", execution_report_body)
              except ValueError as exc:
                  message = str(exc)
                  if "attestation is required" not in message:
                      raise SystemExit(f"Unexpected validation error: {message}")
              else:
                  raise SystemExit("Expected missing attestation rejection did not occur.")
              print("Missing attestation enforcement check passed.")
          else:
              validate_message_body("ExecutionReport", execution_report_body)
              print("Signed verifier mode disabled; attestation requirement check skipped.")
          PY

      - name: Reject malformed verifier attestation signatures
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python - <<'PY'
          from faxp_mvp_simulation import REQUIRE_SIGNED_VERIFIER, run_verification, validate_message_body

          if not REQUIRE_SIGNED_VERIFIER:
              print("Signed verifier mode disabled; malformed attestation check skipped.")
              raise SystemExit(0)

          verification_result, _ = run_verification(
              provider="MockBiometricProvider",
              status="Success",
          )

          attestation = dict(verification_result.get("attestation") or {})
          if not attestation:
              raise SystemExit("Expected attestation in verification result, but none was present.")

          attestation["sig"] = f"{attestation['sig']}tampered"
          verification_result["attestation"] = attestation

          execution_report_body = {
              "LoadID": "load-123",
              "ContractID": "FAXP-20260221-abc123",
              "Status": "Booked",
              "Timestamp": "2026-02-21T00:00:00Z",
              "VerifiedBadge": "Premium",
              "VerificationResult": verification_result,
          }

          try:
              validate_message_body("ExecutionReport", execution_report_body)
          except ValueError as exc:
              message = str(exc)
              if "attestation signature verification failed" not in message:
                  raise SystemExit(f"Unexpected validation error: {message}")
          else:
              raise SystemExit("Expected malformed attestation rejection did not occur.")

          print("Malformed attestation signature rejection check passed.")
          PY

      - name: Reject unknown verification category and method
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python - <<'PY'
          from copy import deepcopy

          from faxp_mvp_simulation import (
              REQUIRE_SIGNED_VERIFIER,
              _build_verifier_attestation,
              run_verification,
              validate_message_body,
          )

          base_result, _ = run_verification(provider="MockBiometricProvider", status="Success")

          def _validate_with_mutation(mutator, expected_fragment):
              verification_result = deepcopy(base_result)
              mutator(verification_result)
              if REQUIRE_SIGNED_VERIFIER:
                  payload = {k: v for k, v in verification_result.items() if k != "attestation"}
                  verification_result["attestation"] = _build_verifier_attestation(payload)
              execution_report_body = {
                  "LoadID": "load-123",
                  "ContractID": "FAXP-20260221-abc123",
                  "Status": "Booked",
                  "Timestamp": "2026-02-21T00:00:00Z",
                  "VerifiedBadge": "Premium",
                  "VerificationResult": verification_result,
              }
              try:
                  validate_message_body("ExecutionReport", execution_report_body)
              except ValueError as exc:
                  message = str(exc)
                  if expected_fragment not in message:
                      raise SystemExit(f"Unexpected validation error: {message}")
              else:
                  raise SystemExit("Expected unknown taxonomy rejection did not occur.")

          _validate_with_mutation(
              lambda result: result.update({"category": "UnknownCategoryX"}),
              "category is not recognized",
          )
          _validate_with_mutation(
              lambda result: result.update({"method": "UnknownMethodX"}),
              "method is not recognized",
          )
          _validate_with_mutation(
              lambda result: result.update({"category": "Compliance", "method": "LivenessPlusDocument"}),
              "category/method combination is not recognized",
          )

          print("Unknown category/method rejection checks passed.")
          PY

      - name: Incident drill (CI mode)
        env:
          FAXP_INCIDENT_DRILL_PROVIDER: MockBiometricProvider
          FAXP_INCIDENT_DRILL_REQUIRE_TRUCK_FLOW: "0"
        run: |
          ./scripts/incident_drill.sh "$RUNNER_TEMP/faxp-secrets/security.env.ci" | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-incident-drill-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Upload CI logs artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: faxp-ci-logs-${{ steps.ci_run_id.outputs.run_id }}
          path: ${{ steps.ci_run_id.outputs.log_dir }}
          if-no-files-found: warn
