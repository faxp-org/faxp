name: FAXP CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Initialize CI Run ID
        id: ci_run_id
        run: |
          RUN_ID="$(python - <<'PY'
          import uuid
          print(uuid.uuid4())
          PY
          )"
          LOG_DIR="/tmp/faxp-ci-${RUN_ID}"
          mkdir -p "${LOG_DIR}"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "log_dir=${LOG_DIR}" >> "$GITHUB_OUTPUT"
          echo "[INFO] CI RunID: ${RUN_ID}"
          echo "[INFO] CI LogDir: ${LOG_DIR}"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make scripts executable
        run: |
          chmod +x \
            security_gate.sh \
            generate_faxp_keys.sh \
            rotate_faxp_keys.sh \
            incident_drill.sh \
            run_secure_demo.sh \
            conformance/quickstart/make_conformance_bundle.sh

      - name: Shell syntax checks
        run: |
          bash -n \
            security_gate.sh \
            generate_faxp_keys.sh \
            rotate_faxp_keys.sh \
            incident_drill.sh \
            run_secure_demo.sh \
            conformance/quickstart/make_conformance_bundle.sh

      - name: Python compile checks
        run: |
          python -m py_compile faxp_mvp_simulation.py fmcsa_adapter_server.py streamlit_app.py streamlit_state_logic.py conformance/generate_attestation.py conformance/conformance_bundle.py conformance/verifier_translator.py tests/run_streamlit_state_logic.py tests/run_schema_compatibility.py tests/run_fmcsa_hosted_adapter.py tests/run_certification_artifacts.py tests/run_policy_decisions.py tests/run_generate_attestation.py tests/run_conformance_bundle.py tests/run_verifier_translator.py tests/run_adapter_server_translation.py

      - name: Streamlit state regression checks
        run: |
          python tests/run_streamlit_state_logic.py

      - name: Hosted FMCSA adapter regression checks
        run: |
          python tests/run_fmcsa_hosted_adapter.py

      - name: Schema compatibility checks (v0.1.1 + v0.2)
        run: |
          python tests/run_schema_compatibility.py

      - name: Certification/profile artifact checks
        run: |
          python tests/run_certification_artifacts.py

      - name: Verification policy decision checks
        run: |
          python tests/run_policy_decisions.py

      - name: Attestation generator checks
        run: |
          python tests/run_generate_attestation.py

      - name: Conformance bundle checks
        run: |
          python tests/run_conformance_bundle.py --output "$RUNNER_TEMP/conformance_report.json"
          rg -q '"passed": true' "$RUNNER_TEMP/conformance_report.json"

      - name: Verifier translator checks
        run: |
          python tests/run_verifier_translator.py

      - name: Adapter server translator wiring checks
        run: |
          python tests/run_adapter_server_translation.py

      - name: Quickstart bundle smoke check
        run: |
          bash conformance/quickstart/make_conformance_bundle.sh "$RUNNER_TEMP/quickstart_bundle"

      - name: Security gate (template)
        run: |
          ./security_gate.sh security.env.template

      - name: Generate CI key material
        run: |
          ./generate_faxp_keys.sh "$RUNNER_TEMP/faxp-secrets"
          cp "$RUNNER_TEMP/faxp-secrets/security.env.local" "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          sed -i 's/^FAXP_APP_MODE=.*/FAXP_APP_MODE=local/' "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          sed -i 's/^FAXP_REQUIRE_EXTERNAL_SECRET_MANAGER=.*/FAXP_REQUIRE_EXTERNAL_SECRET_MANAGER=0/' "$RUNNER_TEMP/faxp-secrets/security.env.ci"

      - name: Simulation smoke test
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --provider MockBiometricProvider --response Accept --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-sim-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-sim-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "\"provider\": \"identity.liveness-document.mock\"" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-sim-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Neutrality smoke test (FMCSA mock provider)
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --provider FMCSA --response Accept --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-neutrality-fmcsa-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-neutrality-fmcsa-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "\"provider\": \"compliance.authority-record.mock\"" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-neutrality-fmcsa-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Security self-test
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --security-self-test --self-test-iterations 25 | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-self-test-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Capability mismatch fails closed
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --force-capability-mismatch --provider MockBiometricProvider --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-capability-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Capability mismatch" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-capability-${{ steps.ci_run_id.outputs.run_id }}.log"
          ! rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-capability-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Legacy alias compatibility (iDenfy)
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python faxp_mvp_simulation.py --provider iDenfy --response Accept --verification-status Success | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-alias-${{ steps.ci_run_id.outputs.run_id }}.log"
          rg -q "Booking completed successfully" "${{ steps.ci_run_id.outputs.log_dir }}/faxp-alias-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: FMCSA parser regression check (MC normalization + authority + insurance)
        run: |
          python tests/run_fmcsa_parser_fixtures.py

      - name: FMCSA contract drift detector check
        run: |
          python - <<'PY'
          from faxp_mvp_simulation import _unknown_fmcsa_top_level_keys

          payload = {
              "content": {"carrier": {}},
              "meta": {"version": "next"},
              "timestamp": "2026-02-21T00:00:00Z",
          }
          unknown = _unknown_fmcsa_top_level_keys(payload)
          assert unknown == ["meta", "timestamp"], unknown
          print("FMCSA contract drift detector check passed.")
          PY

      - name: Reject raw biometric payload fields
        run: |
          python - <<'PY'
          from faxp_mvp_simulation import validate_message_body

          execution_report_body = {
              "LoadID": "load-123",
              "ContractID": "FAXP-20260221-abc123",
              "Status": "Booked",
              "Timestamp": "2026-02-21T00:00:00Z",
              "VerifiedBadge": "None",
              "VerificationResult": {
                  "status": "Success",
                  "provider": "MockBiometricProvider",
                  "rawBiometric": "forbidden-demo-payload"
              }
          }

          try:
              validate_message_body("ExecutionReport", execution_report_body)
          except ValueError as exc:
              message = str(exc)
              if "biometric artifacts" not in message:
                  raise SystemExit(f"Unexpected validation error: {message}")
          else:
              raise SystemExit("Expected raw biometric payload rejection did not occur.")

          print("Raw biometric payload rejection check passed.")
          PY

      - name: Require verifier attestation when signed mode is enabled
        run: |
          python - <<'PY'
          from faxp_mvp_simulation import REQUIRE_SIGNED_VERIFIER, validate_message_body

          execution_report_body = {
              "LoadID": "load-123",
              "ContractID": "FAXP-20260221-abc123",
              "Status": "Booked",
              "Timestamp": "2026-02-21T00:00:00Z",
              "VerifiedBadge": "None",
              "VerificationResult": {
                  "status": "Success",
                  "provider": "MockBiometricProvider",
                  "score": 90,
                  "token": "opaque-token"
              }
          }

          if REQUIRE_SIGNED_VERIFIER:
              try:
                  validate_message_body("ExecutionReport", execution_report_body)
              except ValueError as exc:
                  message = str(exc)
                  if "attestation is required" not in message:
                      raise SystemExit(f"Unexpected validation error: {message}")
              else:
                  raise SystemExit("Expected missing attestation rejection did not occur.")
              print("Missing attestation enforcement check passed.")
          else:
              validate_message_body("ExecutionReport", execution_report_body)
              print("Signed verifier mode disabled; attestation requirement check skipped.")
          PY

      - name: Reject malformed verifier attestation signatures
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python - <<'PY'
          from faxp_mvp_simulation import REQUIRE_SIGNED_VERIFIER, run_verification, validate_message_body

          if not REQUIRE_SIGNED_VERIFIER:
              print("Signed verifier mode disabled; malformed attestation check skipped.")
              raise SystemExit(0)

          verification_result, _ = run_verification(
              provider="MockBiometricProvider",
              status="Success",
          )

          attestation = dict(verification_result.get("attestation") or {})
          if not attestation:
              raise SystemExit("Expected attestation in verification result, but none was present.")

          attestation["sig"] = f"{attestation['sig']}tampered"
          verification_result["attestation"] = attestation

          execution_report_body = {
              "LoadID": "load-123",
              "ContractID": "FAXP-20260221-abc123",
              "Status": "Booked",
              "Timestamp": "2026-02-21T00:00:00Z",
              "VerifiedBadge": "Premium",
              "VerificationResult": verification_result,
          }

          try:
              validate_message_body("ExecutionReport", execution_report_body)
          except ValueError as exc:
              message = str(exc)
              if "attestation signature verification failed" not in message:
                  raise SystemExit(f"Unexpected validation error: {message}")
          else:
              raise SystemExit("Expected malformed attestation rejection did not occur.")

          print("Malformed attestation signature rejection check passed.")
          PY

      - name: Reject unknown verification category and method
        run: |
          set -a
          source "$RUNNER_TEMP/faxp-secrets/security.env.ci"
          set +a
          python - <<'PY'
          from copy import deepcopy

          from faxp_mvp_simulation import (
              REQUIRE_SIGNED_VERIFIER,
              _build_verifier_attestation,
              run_verification,
              validate_message_body,
          )

          base_result, _ = run_verification(provider="MockBiometricProvider", status="Success")

          def _validate_with_mutation(mutator, expected_fragment):
              verification_result = deepcopy(base_result)
              mutator(verification_result)
              if REQUIRE_SIGNED_VERIFIER:
                  payload = {k: v for k, v in verification_result.items() if k != "attestation"}
                  verification_result["attestation"] = _build_verifier_attestation(payload)
              execution_report_body = {
                  "LoadID": "load-123",
                  "ContractID": "FAXP-20260221-abc123",
                  "Status": "Booked",
                  "Timestamp": "2026-02-21T00:00:00Z",
                  "VerifiedBadge": "Premium",
                  "VerificationResult": verification_result,
              }
              try:
                  validate_message_body("ExecutionReport", execution_report_body)
              except ValueError as exc:
                  message = str(exc)
                  if expected_fragment not in message:
                      raise SystemExit(f"Unexpected validation error: {message}")
              else:
                  raise SystemExit("Expected unknown taxonomy rejection did not occur.")

          _validate_with_mutation(
              lambda result: result.update({"category": "UnknownCategoryX"}),
              "category is not recognized",
          )
          _validate_with_mutation(
              lambda result: result.update({"method": "UnknownMethodX"}),
              "method is not recognized",
          )
          _validate_with_mutation(
              lambda result: result.update({"category": "Compliance", "method": "LivenessPlusDocument"}),
              "category/method combination is not recognized",
          )

          print("Unknown category/method rejection checks passed.")
          PY

      - name: Incident drill (CI mode)
        env:
          FAXP_INCIDENT_DRILL_PROVIDER: MockBiometricProvider
          FAXP_INCIDENT_DRILL_REQUIRE_TRUCK_FLOW: "0"
        run: |
          ./incident_drill.sh "$RUNNER_TEMP/faxp-secrets/security.env.ci" | tee "${{ steps.ci_run_id.outputs.log_dir }}/faxp-incident-drill-${{ steps.ci_run_id.outputs.run_id }}.log"

      - name: Upload CI logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faxp-ci-logs-${{ steps.ci_run_id.outputs.run_id }}
          path: ${{ steps.ci_run_id.outputs.log_dir }}
          if-no-files-found: warn
