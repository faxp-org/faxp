name: A2A Upstream Watch

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  watch:
    permissions:
      contents: read
    outputs:
      has_drift: ${{ steps.watch.outputs.has_drift }}
      watch_failed: ${{ steps.watch.outputs.watch_failed }}
      issue_title: ${{ steps.watch.outputs.issue_title }}
      issue_body: ${{ steps.watch.outputs.issue_body }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Run A2A upstream watch
        id: watch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python scripts/check_a2a_upstream.py \
            --tracking docs/interop/A2A_UPSTREAM_TRACKING.json \
            --output /tmp/a2a_watch_report.json \
            --issue-body /tmp/a2a_watch_issue.md
          code=$?

          if [ -f /tmp/a2a_watch_report.json ]; then
            has_drift="$(python -c "import json; print('true' if bool(json.load(open('/tmp/a2a_watch_report.json', 'r', encoding='utf-8')).get('hasDrift')) else 'false')")"
            issue_title="$(python -c "import json; print(str(json.load(open('/tmp/a2a_watch_report.json', 'r', encoding='utf-8')).get('issueTitle') or '[A2A Watch] Upstream drift detected').replace('\\n', ' '))")"
            echo "has_drift=${has_drift}" >> "$GITHUB_OUTPUT"
            printf 'issue_title=%s\n' "$issue_title" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "issue_title=[A2A Watch] Upstream watch check failed" >> "$GITHUB_OUTPUT"
          fi

          if [ $code -ne 0 ]; then
            echo "watch_failed=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              '## A2A Upstream Watch Failure' \
              '' \
              'The scheduled A2A upstream watch workflow failed before drift evaluation completed.' \
              '' \
              '### Required Actions' \
              '1. Inspect workflow logs for failure details.' \
              '2. Run local command:' \
              '   `python3 scripts/check_a2a_upstream.py --tracking docs/interop/A2A_UPSTREAM_TRACKING.json --output /tmp/a2a_watch_report.json --issue-body /tmp/a2a_watch_issue.md`' \
              '3. Fix the failure path and re-run workflow.' \
              > /tmp/a2a_watch_issue.md
          else
            echo "watch_failed=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f /tmp/a2a_watch_issue.md ]; then
            issue_body="$(cat /tmp/a2a_watch_issue.md)"
          else
            issue_body='A2A watch detected an actionable change. See workflow logs.'
          fi
          delimiter="ISSUE_BODY_$(python - <<'PY'
import uuid
print(uuid.uuid4().hex)
PY
)"
          {
            echo "issue_body<<${delimiter}"
            printf '%s\n' "$issue_body"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

          exit 0

  open_issue:
    if: needs.watch.outputs.has_drift == 'true' || needs.watch.outputs.watch_failed == 'true'
    needs: watch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open tracking issue when drift/failure is detected
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          ISSUE_TITLE: ${{ needs.watch.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.watch.outputs.issue_body }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE || '[A2A Watch] Upstream drift detected';
            const body = process.env.ISSUE_BODY || 'A2A watch detected an actionable change. See workflow logs.';

            const { owner, repo } = context.repo;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const exists = openIssues.some((issue) => issue.title === title);
            if (exists) {
              core.info(`Issue already open: ${title}`);
              return;
            }

            await github.rest.issues.create({ owner, repo, title, body });
            core.info(`Created issue: ${title}`);
